<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFO Food Tracker</title>
  <meta name="description" content="Track your food storage. Eat what expires first.">
  <meta name="theme-color" content="#2C3E50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FIFO">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Access Gate -->
  <div id="gate" class="gate" role="main">
    <div class="gate-inner">
      <h1 class="gate-title">FIFO Food Tracker</h1>
      <p class="gate-subtitle">Enter your access code to get started.</p>
      <form id="gate-form" class="gate-form">
        <label for="gate-code" class="sr-only">Access Code</label>
        <input type="text" id="gate-code" class="gate-input" placeholder="Access code" autocomplete="off" autocapitalize="characters" required>
        <button type="submit" class="btn btn-primary gate-btn">Enter</button>
      </form>
      <p id="gate-error" class="gate-error" hidden>Invalid access code. Please try again.</p>
    </div>
  </div>

  <!-- App (hidden until access granted) -->
  <div id="app" class="app" hidden>

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">FIFO</h1>
      <button id="settings-btn" class="btn btn-ghost btn-icon" aria-label="Settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>

    <!-- Summary bar -->
    <div id="summary" class="summary"></div>

    <!-- Tab content areas -->
    <main class="tab-content">
      <section id="panel-inventory" class="tab-panel active" role="tabpanel" aria-labelledby="tab-inventory">
        <div id="inventory-list" class="item-list"></div>
        <button id="toggle-eaten" class="btn btn-ghost toggle-eaten" hidden>Show eaten items</button>
      </section>

      <section id="panel-week" class="tab-panel" role="tabpanel" aria-labelledby="tab-week" hidden>
        <div id="week-list" class="item-list"></div>
      </section>

      <section id="panel-month" class="tab-panel" role="tabpanel" aria-labelledby="tab-month" hidden>
        <div id="month-list" class="item-list"></div>
      </section>

      <section id="panel-settings" class="tab-panel" role="tabpanel" hidden>
        <div class="settings-section">
          <h2 class="settings-heading">Data Management</h2>

          <button id="export-btn" class="btn btn-ghost settings-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>

          <label class="btn btn-ghost settings-btn import-label">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import CSV
            <input type="file" id="import-input" accept=".csv" class="sr-only">
          </label>

          <button id="clear-btn" class="btn btn-danger settings-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            Clear All Data
          </button>
        </div>
      </section>
    </main>

    <!-- FAB -->
    <button id="fab" class="fab" aria-label="Add item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="tablist" aria-label="Main navigation">
      <button id="tab-inventory" class="nav-tab active" role="tab" aria-selected="true" aria-controls="panel-inventory">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Inventory</span>
      </button>
      <button id="tab-week" class="nav-tab" role="tab" aria-selected="false" aria-controls="panel-week">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>This Week</span>
      </button>
      <button id="tab-month" class="nav-tab" role="tab" aria-selected="false" aria-controls="panel-month">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>This Month</span>
      </button>
      <button id="tab-settings" class="nav-tab" role="tab" aria-selected="false" aria-controls="panel-settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Add/Edit Item Dialog -->
  <dialog id="item-dialog" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="dialog-title" class="modal-title">Add Item</h2>
        <button id="dialog-close" class="btn btn-ghost btn-icon modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="item-form" class="item-form">
        <input type="hidden" id="item-id">
        <div class="form-field">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" required autocomplete="off">
        </div>
        <div class="form-field">
          <label for="item-category">Category</label>
          <select id="item-category">
            <option value="Canned Goods">Canned Goods</option>
            <option value="Dry Goods">Dry Goods</option>
            <option value="Grains & Pasta">Grains &amp; Pasta</option>
            <option value="Freeze-Dried">Freeze-Dried</option>
            <option value="Water">Water</option>
            <option value="Medical">Medical</option>
            <option value="Snacks & Bars">Snacks &amp; Bars</option>
            <option value="Condiments">Condiments</option>
            <option value="Dairy">Dairy</option>
            <option value="Frozen">Frozen</option>
            <option value="Beverages">Beverages</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for="item-qty">Quantity</label>
            <input type="number" id="item-qty" min="1" value="1">
          </div>
          <div class="form-field">
            <label for="item-stored">Date Stored</label>
            <input type="date" id="item-stored">
          </div>
        </div>
        <div class="form-field">
          <label for="item-expires">Expiration Date</label>
          <input type="date" id="item-expires" required>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-delete" class="btn btn-danger" hidden>Delete</button>
          <div class="form-actions-right">
            <button type="submit" id="btn-add" class="btn btn-ghost">Add Item</button>
            <button type="button" id="btn-add-close" class="btn btn-primary">Add &amp; Close</button>
          </div>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Clear Data Confirmation Dialog -->
  <dialog id="clear-dialog" class="modal">
    <div class="modal-content modal-content-sm">
      <h2 class="modal-title">Clear All Data</h2>
      <p class="modal-text">This will permanently delete all items. Type <strong>DELETE</strong> to confirm.</p>
      <form id="clear-form">
        <div class="form-field">
          <label for="clear-confirm" class="sr-only">Type DELETE to confirm</label>
          <input type="text" id="clear-confirm" placeholder="Type DELETE" autocomplete="off">
        </div>
        <div class="form-actions">
          <button type="button" id="clear-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="clear-submit" class="btn btn-danger">Delete Everything</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
