<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access — MicroPrepared</title>
  <meta name="theme-color" content="#2C3E50">
  <link rel="icon" type="image/png" sizes="192x192" href="/fifo/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #2C3E50;
      --color-danger: #C0392B;
      --color-bg: #FAFAFA;
      --color-text: #333333;
      --color-text-secondary: #777777;
      --color-border: #E0E0E0;
      --color-surface: #FFFFFF;
      --font-primary: "Lexend Deca", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font-primary);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .gate-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .gate-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
    }

    .gate-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .gate-subtitle {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .gate-input {
      width: 100%;
      padding: 12px 16px;
      font-family: var(--font-primary);
      font-size: 1rem;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
      letter-spacing: 1px;
    }

    .gate-input:focus {
      border-color: var(--color-primary);
    }

    .gate-input.error {
      border-color: var(--color-danger);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .gate-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-family: var(--font-primary);
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: var(--color-primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .gate-btn:hover { opacity: 0.9; }
    .gate-btn:active { opacity: 0.8; }

    .gate-error {
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--color-danger);
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <div class="gate-card">
    <img src="/MPLogoTransp.png" alt="MicroPrepared" class="gate-logo">
    <h1 class="gate-title">Members Access</h1>
    <p class="gate-subtitle">Enter your passcode to continue.</p>
    <form id="gate-form">
      <input
        type="text"
        id="gate-code"
        class="gate-input"
        placeholder="Passcode"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        autofocus
      >
      <button type="submit" class="gate-btn">Enter</button>
      <p id="gate-error" class="gate-error"></p>
    </form>
  </div>

  <script>
    // SHA-256 hash of the permanent passcode "MicroPrepNow"
    const VALID_HASHES = [
      '4d6b1963c041e4d6de6164d6db2ea79370d55d87601a6ce9cfe38ea409b4c8dd'
    ];

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256',
        new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // If already authenticated, redirect immediately
    if (localStorage.getItem('mp_auth') === 'granted') {
      const params = new URLSearchParams(location.search);
      const dest = params.get('redirect') || '/fifo/';
      location.replace(dest);
    }

    const form = document.getElementById('gate-form');
    const input = document.getElementById('gate-code');
    const errorEl = document.getElementById('gate-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = input.value.trim();
      if (!code) return;

      const hash = await sha256(code);

      if (VALID_HASHES.includes(hash)) {
        localStorage.setItem('mp_auth', 'granted');
        const params = new URLSearchParams(location.search);
        const dest = params.get('redirect') || '/fifo/';
        location.replace(dest);
      } else {
        input.classList.add('error');
        errorEl.textContent = 'Invalid passcode.';
        setTimeout(() => input.classList.remove('error'), 400);
      }
    });

    input.addEventListener('input', () => {
      errorEl.textContent = '';
    });
  </script>
</body>
</html>
